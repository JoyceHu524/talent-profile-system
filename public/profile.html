<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人档案 · 高潜人才画像系统</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <a href="/dashboard" class="navbar-brand">
      <div class="brand-icon">🌟</div>
      <span>高潜人才画像</span>
    </a>
    <ul class="navbar-nav">
      <li><a href="/dashboard">人员列表</a></li>
      <li><a href="/group">群体分析</a></li>
    </ul>
    <div class="navbar-actions">
      <button class="btn btn-secondary btn-sm" onclick="logout()">退出</button>
    </div>
  </nav>

  <div class="page-container">
    <!-- 面包屑 -->
    <div class="breadcrumb">
      <a href="/dashboard">人员列表</a>
      <span class="sep">›</span>
      <span class="current" id="breadcrumbName">个人档案</span>
    </div>

    <div class="profile-layout">
      <!-- 左栏 -->
      <div class="profile-left">
        <!-- 基础信息卡片 -->
        <div class="person-info-card">
          <div class="person-info-header">
            <div class="person-info-avatar" id="avatarInitial">?</div>
            <div class="person-info-name" id="infoName">加载中...</div>
            <div class="person-info-position" id="infoPosition">—</div>
          </div>
          <div class="info-list" id="infoList">
            <!-- 动态生成 -->
          </div>
        </div>

        <!-- 文件上传区域 -->
        <div class="upload-card">
          <div class="card-header">
            <span class="card-title">📁 数据材料</span>
          </div>

          <!-- Excel基础数据 -->
          <div class="upload-section">
            <div class="upload-section-header">
              <div class="upload-section-title">
                <span class="upload-section-icon icon-excel">📊</span>
                基础数据（Excel/CSV）
              </div>
            </div>
            <div class="upload-btn-area" onclick="triggerUpload('excel')">
              点击上传 .xlsx / .csv
            </div>
            <div class="file-list" id="fileList-excel"></div>
            <input type="file" id="fileInput-excel" accept=".xlsx,.csv" style="display:none" onchange="uploadFile(this, 'excel')">
          </div>

          <!-- PDF测评报告 -->
          <div class="upload-section">
            <div class="upload-section-header">
              <div class="upload-section-title">
                <span class="upload-section-icon icon-pdf">📄</span>
                测评报告（PDF）
              </div>
            </div>
            <div class="upload-btn-area" onclick="triggerUpload('pdf')">
              点击上传 .pdf（可多份）
            </div>
            <div class="file-list" id="fileList-pdf"></div>
            <input type="file" id="fileInput-pdf" accept=".pdf" multiple style="display:none" onchange="uploadFile(this, 'pdf')">
          </div>

          <!-- 访谈录音 -->
          <div class="upload-section">
            <div class="upload-section-header">
              <div class="upload-section-title">
                <span class="upload-section-icon icon-audio">🎙️</span>
                访谈录音
              </div>
            </div>
            <div class="upload-btn-area" onclick="triggerUpload('audio')">
              点击上传 .mp3 / .wav / .m4a
            </div>
            <div class="file-list" id="fileList-audio"></div>
            <input type="file" id="fileInput-audio" accept=".mp3,.wav,.m4a" multiple style="display:none" onchange="uploadFile(this, 'audio')">
          </div>

          <!-- 文档 -->
          <div class="upload-section">
            <div class="upload-section-header">
              <div class="upload-section-title">
                <span class="upload-section-icon icon-doc">📝</span>
                作业/学习分享
              </div>
            </div>
            <div class="upload-btn-area" onclick="triggerUpload('doc')">
              点击上传 .pdf / .docx / .txt
            </div>
            <div class="file-list" id="fileList-doc"></div>
            <input type="file" id="fileInput-doc" accept=".pdf,.docx,.txt" multiple style="display:none" onchange="uploadFile(this, 'doc')">
          </div>
        </div>
      </div>

      <!-- 右栏 -->
      <div class="profile-right">
        <!-- 雷达图 + 维度分值 -->
        <div class="radar-card">
          <div class="card-header">
            <span class="card-title">🎯 特质画像</span>
            <span id="lastAnalyzedAt" style="font-size:12px;color:var(--text-muted);">尚未分析</span>
          </div>
          <div class="card-body">
            <div class="radar-container">
              <div class="radar-chart-wrap">
                <canvas id="radarChart" width="320" height="320"></canvas>
              </div>
            </div>
            <div style="margin-top:20px;">
              <div class="dimensions-grid" id="dimensionsGrid">
                <!-- 动态生成 -->
              </div>
            </div>
          </div>
        </div>

        <!-- 综合文字报告 -->
        <div class="report-card">
          <div class="card-header">
            <span class="card-title">📋 综合分析报告</span>
            <button class="btn btn-secondary btn-sm" onclick="saveReport()">保存</button>
          </div>
          <div class="card-body">
            <textarea class="report-editor" id="overallReport" placeholder="点击「触发AI分析」生成综合报告，也可手动编辑..."></textarea>
          </div>
        </div>

        <!-- 发展建议 -->
        <div class="report-card">
          <div class="card-header">
            <span class="card-title">🚀 发展建议</span>
            <button class="btn btn-secondary btn-sm" onclick="saveReport()">保存</button>
          </div>
          <div class="card-body">
            <textarea class="report-editor" id="developmentSuggestions" placeholder="点击「触发AI分析」生成发展建议，也可手动编辑..."></textarea>
          </div>
        </div>

        <!-- 操作栏 -->
        <div class="action-bar">
          <div class="action-bar-left">
            <div id="analyzingIndicator" style="display:none;" class="analyzing-indicator">
              <div class="spinner"></div>
              AI 分析中，请稍候...
            </div>
          </div>
          <div class="action-bar-right">
            <button class="btn btn-secondary" onclick="exportPDF()">📥 导出PDF</button>
            <button class="btn btn-primary ai-btn" onclick="triggerAnalysis()" id="analyzeBtn">✨ 触发AI分析</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/app.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
