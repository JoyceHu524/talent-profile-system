<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高潜人才画像系统 · 登录</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">🌟</div>
        <h1>高潜人才画像系统</h1>
        <p>Talent Profile System</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input type="text" class="form-control" id="username" placeholder="请输入用户名" value="admin" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-control" id="password" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <div id="loginError" style="display:none; color: var(--danger); font-size:13px; margin-bottom:12px; padding: 8px 12px; background:#FEF2F2; border-radius:6px;"></div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:11px;" id="loginBtn">
          登录
        </button>
      </form>

      <p style="text-align:center; margin-top:20px; font-size:12px; color:var(--text-muted);">
        默认密码：talent2024
      </p>
    </div>
  </div>

  <script>
    // 检查是否已登录
    fetch('/api/auth/status').then(r => r.json()).then(data => {
      if (data.loggedIn) window.location.href = '/dashboard';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');
      btn.disabled = true;
      btn.textContent = '登录中...';
      errEl.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/dashboard';
        } else {
          errEl.textContent = data.message || '登录失败';
          errEl.style.display = 'block';
        }
      } catch (err) {
        errEl.textContent = '网络错误，请重试';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '登录';
      }
    });

    // 回车提交
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('loginForm').dispatchEvent(new Event('submit'));
    });
  </script>
</body>
</html>
